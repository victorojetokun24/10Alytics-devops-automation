name: Terraform CI/CD with Auto Teardown # Workflow name

on: # Trigger the workflow on push or pull request to master branch
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

# Define the job to run Terraform commands
jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terra-config

        # Set environment variables for AWS credentials and region
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1
# Define the steps to execute Terraform commands and perform health checks
    steps:
      - name: Checkout code # Checkout the repository code to the runner
        uses: actions/checkout@v3 # Use the latest version of the checkout action

      - name: Setup Terraform # Set up Terraform CLI on the runner
        uses: hashicorp/setup-terraform@v3 # Use the latest version of the Terraform setup action

      - name: Terraform Init # Initialize Terraform to download providers and set up the working directory
        run: terraform init # Run the terraform init command

      - name: Terraform Validate # Validate the Terraform configuration files for syntax and consistency
        run: terraform validate # Run the terraform validate command

      - name: Terraform Plan # Create an execution plan to preview the changes that Terraform will make
        run: terraform plan -out=tfplan # 

      - name: Terraform Apply # Apply the Terraform plan to create or update infrastructure resources
        run: terraform apply -auto-approve tfplan # Run the terraform apply command with auto-approval to skip interactive confirmation

      - name: Wait for instance startup # Wait for a few seconds to allow the EC2 instance and the application to start up before performing health checks
        run: |
          echo "Waiting 90s for instance and app startup..." 
          sleep 90 # Sleep for 90 seconds to ensure the EC2 instance and the application are fully up and running

      - name: Fetch Public IP # Fetch the public IP address of the EC2 instance created by Terraform and set it as an output variable for use in subsequent steps
        id: ec2_ip # Set an ID for this step to reference its outputs in later steps
        run: | #  Run a shell command to get the public IP address from Terraform output and set it as a GitHub Actions output variable
          PUBLIC_IP=$(terraform output -raw public_ip) # Get the public IP address from Terraform output using the -raw flag to get a plain string value
          echo "public_ip=$PUBLIC_IP" >> $GITHUB_OUTPUT # Set the public IP as an output variable for use in later steps

      - name: Health Check App # Perform a health check on the application running on the EC2 instance by sending an HTTP request to the public IP address and checking for a successful response
        run: | #  Run a shell command to perform a health check on the application by sending an HTTP request to the public IP address and checking for a successful response
          echo "Checking app at http://${{ steps.ec2_ip.outputs.public_ip }}" 
          curl -f http://${{ steps.ec2_ip.outputs.public_ip }} || (echo "App not responding" && exit 1) # Use curl with the -f flag to fail silently on server errors and check if the app is responding, if not, print an error message and exit with a non-zero status to fail the step

      - name: Keep App Running # Keep the application running for a short period to allow manual testing or verification before tearing down the infrastructure
        run: |
          echo "Keeping app alive for 5 minutes..." # Print a message indicating that the application will be kept alive for 5 minutes to allow for manual testing or verification
          echo "Application is running at: http://${{ steps.ec2_ip.outputs.public_ip }}" # Print the URL of the application for easy access during the testing period
          sleep 300 # Sleep for 300 seconds (5 minutes) to keep the application running and allow for manual testing or verification

      - name: Terraform Destroy # Destroy the infrastructure resources created by Terraform to clean up and avoid unnecessary costs, using the -auto-approve flag to skip interactive confirmation
        if: always() # Ensure that this step runs regardless of the success or failure of previous steps to guarantee that resources are cleaned up
        run: terraform destroy -auto-approve # Run the terraform destroy command with auto-approval to skip interactive confirmation and ensure that all resources are cleaned up after the testing period
