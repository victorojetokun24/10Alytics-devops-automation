name: Terraform CI/CD with Auto Teardown

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terra-config
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Fetch Public IP
        id: ec2_ip
        run: |
          PUBLIC_IP=$(terraform output -raw public_ip)
          echo "public_ip=$PUBLIC_IP" >> $GITHUB_OUTPUT

      - name: Health Check App
        run: |
          PUBLIC_IP=${{ steps.ec2_ip.outputs.public_ip }}
          echo "Checking app at http://$PUBLIC_IP:80"

          # Retry loop to wait for nginx to be ready
          for i in {1..12}; do
            curl -f http://$PUBLIC_IP:80 && echo "App is responding!" && exit 0
            echo "App not responding yet, retrying in 10s..."
            sleep 10
          done

          echo "App did not respond after 2 minutes."
          exit 1

      - name: Keep App Running for Testing
        run: |
          PUBLIC_IP=${{ steps.ec2_ip.outputs.public_ip }}
          echo "Application is running at: http://$PUBLIC_IP"
          echo "Keeping app alive for 5 minutes..."
          sleep 300

      - name: Terraform Destroy
        if: always()
        run: terraform destroy -auto-approve